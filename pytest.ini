[pytest]
pythonpath = . external_systems/regulator external_systems/digital_mine src_starting_point
testpaths = src_starting_point/tests tests src_solution/tests references/isolation/tests references/secure_ipc/tests
markers =
    docker: интеграция с Регулятором по HTTP (нужен docker compose up)
    security: тесты безопасности (покрытие по ЦБ)
filterwarnings =
    ignore::DeprecationWarning

[flake8]
max-line-length = 88
extend-ignore = E501
